name: NGX Daily Signal Engine

on:
  schedule:
    # Runs at 3:30 PM WAT (2:30 PM UTC) every weekday after NGX market close
    - cron: '30 14 * * 1-5'
  workflow_dispatch:  # Also allows manual trigger from GitHub Actions tab

jobs:
  compute-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy supabase

      - name: Run signal engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_signals.py